services:
  angular-app:
    build:
      context: ./angular-app
    ports:
      - "4200:80"
    depends_on:
      - spring-boot-app

  spring-boot-app:
    build:
      context: ./springboot/app
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/demo
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    depends_on:
      - mysql

  mysql:
    image: mysql:5.7
    restart: always
    environment:
      MYSQL_DATABASE: demo
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - demo:/var/lib/mysql

volumes:
  demo:
